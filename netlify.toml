[build]
  publish = "out"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"
  NODE_OPTIONS = "--max-old-space-size=4096"

# Gzip/Brotli: Netlify compresses text assets automatically. No [build.processing] (deprecated).

[context.production.environment]
  NODE_ENV = "production"

[[redirects]]
  from = "/*"
  to = "https://ancel.co.ke/:splat"
  status = 301
  force = true
  [redirects.conditions]
    Host = ["ancel-ajanga.netlify.app"]

# Static export redirects (define here; next.config redirects don't run with output: export)
[[redirects]]
  from = "/blog"
  to = "/developer-journal"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Modern Security: Basic CSP to prevent common injection without breaking your scripts
    Content-Security-Policy = "upgrade-insecure-requests; block-all-mixed-content;"
    # Permissions Policy: Disables unused hardware APIs to improve privacy/security
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: cacheable at the edge but always revalidated (ETag changes on each deploy → fresh body).
# no-store was removed — it prevented any CDN storage; max-age=0 + must-revalidate keeps freshness.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.json"
  [headers.values]
    # Faster data fetching for your projects/blog data
    Cache-Control = "public, max-age=3600, stale-while-revalidate=600"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Image CDN — long cache for optimized images
[[headers]]
  for = "/.netlify/images*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Favicon and app icons — long cache
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json"
